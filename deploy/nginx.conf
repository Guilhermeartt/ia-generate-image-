# ──────────────────────────────────────────────────────────────────────────────
# Vycena — nginx reverse proxy
# Renderizado pelo setup.sh substituindo __DOMAIN__ pelo domínio real.
# ──────────────────────────────────────────────────────────────────────────────

# Redireciona HTTP → HTTPS. Certbot adiciona o block 443 quando emitir o cert.
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    # ACME challenge para Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__;

    # Certificados gerenciados pelo certbot — preenchidos automaticamente
    # ssl_certificate /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;

    # Limites generosos pra upload de imagem base64 (cobre o endpoint /api/gemini/*)
    client_max_body_size 80m;
    client_body_buffer_size 1m;

    # Timeouts longos para geração de imagem (Gemini pode demorar ~30s)
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Gzip para o build do Vite
    gzip on;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml application/wasm
        image/svg+xml font/ttf font/otf;
    gzip_min_length 1024;

    # Cache forte para assets versionados do Vite (hash no nome)
    location /assets/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Webhook do Stripe precisa do body cru sem buffering (Fase 3)
    location = /api/stripe/webhook {
        proxy_pass http://127.0.0.1:8787;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
    }

    # Tudo mais → Node
    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Não cachear API
        add_header Cache-Control "no-store";
    }

    # Healthcheck público — útil pro uptime monitor externo
    location = /api/health {
        proxy_pass http://127.0.0.1:8787;
        access_log off;
    }
}
