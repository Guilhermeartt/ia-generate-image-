<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Estúdio de Roteiro Visual com IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --clr-bg:       #03020d;
        --clr-card:     rgba(12, 10, 30, 0.80);
        --clr-border:   rgba(139, 92, 246, 0.14);
        --violet:       #7c3aed;
        --violet-soft:  #a78bfa;
      }

      *, *::before, *::after { box-sizing: border-box; }

      html { scroll-behavior: smooth; }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--clr-bg);
        background-image:
          radial-gradient(ellipse 90% 55% at 50% -5%,  rgba(109, 40, 217, 0.18) 0%, transparent 65%),
          radial-gradient(ellipse 55% 40% at 85% 105%, rgba(76,  29, 149, 0.12) 0%, transparent 55%),
          radial-gradient(ellipse 40% 30% at  5%  80%, rgba(91,  33, 182, 0.08) 0%, transparent 50%);
        min-height: 100vh;
        color: #e2e8f0;
      }

      /* ── Scrollbar ── */
      ::-webkit-scrollbar             { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track       { background: #08061a; }
      ::-webkit-scrollbar-thumb       { background: rgba(139,92,246,.35); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(139,92,246,.60); }

      /* ── Glass card ── */
      .glass {
        background: var(--clr-card);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--clr-border);
      }
      .glass-hover { transition: border-color .25s, box-shadow .25s; }
      .glass-hover:hover {
        border-color: rgba(139,92,246,.30);
        box-shadow: 0 0 28px rgba(139,92,246,.08);
      }

      /* ── Text gradient ── */
      .text-gradient-violet {
        background: linear-gradient(135deg, #c4b5fd 0%, #8b5cf6 50%, #a78bfa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ── Primary button ── */
      .btn-primary {
        background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
        border: 1px solid rgba(167,139,250,.25);
        transition: background .2s, box-shadow .2s, transform .15s;
      }
      .btn-primary:hover:not(:disabled) {
        background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
        box-shadow: 0 0 18px rgba(139,92,246,.40);
        transform: translateY(-1px);
      }
      .btn-primary:active:not(:disabled) { transform: translateY(0); }
      .btn-primary:disabled {
        background: rgba(30,27,75,.7);
        border-color: transparent;
        box-shadow: none;
        opacity: .55;
        cursor: not-allowed;
      }

      /* ── Ghost button ── */
      .btn-ghost {
        background: rgba(139,92,246,.07);
        border: 1px solid rgba(139,92,246,.18);
        color: #a78bfa;
        transition: background .2s, box-shadow .2s, border-color .2s;
      }
      .btn-ghost:hover:not(:disabled) {
        background: rgba(139,92,246,.15);
        border-color: rgba(139,92,246,.35);
        box-shadow: 0 0 12px rgba(139,92,246,.2);
      }

      /* ── Input / select ── */
      .input-glass {
        background: rgba(8, 6, 22, .80);
        border: 1px solid rgba(139,92,246,.15);
        color: #e2e8f0;
        transition: border-color .2s, box-shadow .2s;
      }
      .input-glass:focus {
        outline: none;
        border-color: rgba(139,92,246,.5);
        box-shadow: 0 0 0 3px rgba(139,92,246,.10);
      }
      .input-glass::placeholder { color: #4b4673; }
      .input-glass option         { background: #0f0c26; color: #e2e8f0; }

      /* ── Animations ── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(18px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes pulseGlow {
        0%,100% { box-shadow: 0 0  8px rgba(139,92,246,.30); }
        50%     { box-shadow: 0 0 22px rgba(139,92,246,.65); }
      }
      @keyframes shimmer {
        from { background-position: -200% center; }
        to   { background-position:  200% center; }
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .animate-fade-in-up  { animation: fadeInUp .45s cubic-bezier(.22,1,.36,1) both; }
      .animate-fade-in     { animation: fadeIn   .35s ease both; }
      .animate-pulse-glow  { animation: pulseGlow 2.2s ease-in-out infinite; }

      /* Stagger delays for grid children */
      .stagger > *:nth-child(1) { animation-delay:  0ms; }
      .stagger > *:nth-child(2) { animation-delay: 60ms; }
      .stagger > *:nth-child(3) { animation-delay:120ms; }
      .stagger > *:nth-child(4) { animation-delay:180ms; }
      .stagger > *:nth-child(5) { animation-delay:240ms; }
      .stagger > *:nth-child(6) { animation-delay:300ms; }
      .stagger > *:nth-child(7) { animation-delay:360ms; }
      .stagger > *:nth-child(8) { animation-delay:420ms; }

      /* ── Misc ── */
      .ring-violet { box-shadow: 0 0 0 2px rgba(139,92,246,.5); }
    </style>
  <script type="importmap">

</script>
